name: macOS

on:
  push:
    branches: [main, ci/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp:
    name: C++ Bazel
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run tests
        run: bazelisk test //src/... //third_party/utf8_range/... --test_output=errors

  upb:
    name: UPB Bazel
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: 3.12
      - name: Run tests
        run: bazelisk test //upb/... //upb_generator/... --test_output=errors
