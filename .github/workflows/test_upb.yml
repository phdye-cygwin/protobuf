name: μpb Tests

on:
  workflow_call:
    inputs:
      continuous-run:
        required: true
        description: "Boolean string denoting whether this run is continuous --
          empty string for presubmit, non-empty string for continuous."
        type: string
      safe-checkout:
        required: true
        description: "The SHA key for the commit we want to run over"
        type: string
      continuous-prefix:
        required: true
        description: "The string continuous-only tests should be prefixed with when displaying test
          results."
        type: string


permissions:
  contents: read

jobs:
  # Fork CI: replaced Docker/GAR jobs with direct Bazel (no credentials needed)
  linux:
    name: Linux Fastbuild
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pending changes
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.safe-checkout || github.sha }}
      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
      - name: Run tests
        run: bazel test //upb/... //upb_generator/... --test_output=errors

  windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - name: Checkout pending changes
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.safe-checkout || github.sha }}
      - name: Run tests
        run: bazelisk test //upb/... //upb_generator/... --test_output=errors -- -//python:conformance_test -//upb/reflection:def_builder_test

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - name: Checkout pending changes
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.safe-checkout || github.sha }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Run tests
        run: bazelisk test //upb/... //upb_generator/... --test_output=errors

  # Fork CI: build_wheels removed (requires GAR Docker images)

  # Fork CI: test_wheels, test_pure_python_wheels, test_python_compatibility
  # removed (depend on build_wheels which requires GAR Docker images)
