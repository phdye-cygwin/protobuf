name: C++ Tests

on:
  workflow_call:
    inputs:
      continuous-run:
        required: true
        description: "Boolean string denoting whether this run is continuous --
          empty string for presubmit, non-empty string for continuous."
        type: string
      safe-checkout:
        required: true
        description: "The SHA key for the commit we want to run over"
        type: string
      continuous-prefix:
        required: true
        description: "The string continuous-only tests should be prefixed with when displaying test
          results."
        type: string


permissions:
  contents: read

jobs:
  # Fork CI: all protocolbuffers/protobuf-ci actions replaced with plain
  # actions/checkout + bazelisk. No GAR credentials needed.

  linux:
    name: Linux Optimized
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout pending changes
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.safe-checkout || github.sha }}
      - name: Install Bazelisk
        run: |
          sudo curl -fsSL -o /usr/local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel
      - name: Run tests
        run: bazel test //src/... //third_party/utf8_range/... --config=opt --test_output=errors

  non-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MacOS Bazel
            os: macos-14
            bazel: test //src/... //third_party/utf8_range/...
          - name: Windows Bazel
            os: windows-2022
            bazel: test //src/... --test_tag_filters=-conformance --build_tag_filters=-conformance
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Checkout pending changes
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.safe-checkout || github.sha }}
      - name: Run tests
        run: bazelisk ${{ matrix.bazel }} --test_output=errors
